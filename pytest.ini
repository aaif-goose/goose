[pytest]
# Skein-only Python test config. Upstream goose has no top-level pytest config,
# so this file is purely additive and does not collide on upstream merges.
testpaths =
    eval-bench/tests
    recipes
# importlib mode disambiguates same-basename test modules across recipes
# (e.g., every recipe ships its own test_recipe_artifacts.py); the default
# rootdir-based import mode rejects the collision.
addopts = -ra --import-mode=importlib

# This is a **reuseable** workflow that builds the CLI for multiple platforms.
# It doesn't get triggered on its own. It gets used in multiple workflows:
#  - release.yml
#  - canary.yml
#
# Platform Build Strategy:
#  - Linux: Uses native Ubuntu runners with Docker container for glibc 2.35
#    compatibility (builds inside ubuntu:22.04 to support older distros).
#    Includes arm64 hosted runners.
#  - macOS: Uses native macOS runners for each architecture
#  - Windows: Uses Windows runner with native MSVC build
on:
  workflow_call:
    inputs:
      version:
        required: false
        default: ""
        type: string
      ref:
        type: string
        required: false
        default: ""

name: "Reusable workflow to build CLI"

jobs:
  # ------------------------------------
  # Linux builds: run inside an ubuntu:22.04 container for glibc 2.35 compat.
  # This ensures the resulting binary works on Ubuntu 22.04+, Debian 12+,
  # RHEL 9+, Amazon Linux 2023+, and other LTS distros.
  # ------------------------------------
  build-cli-linux:
    name: Build CLI (Linux ${{ matrix.architecture }})
    runs-on: ${{ matrix.build-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            target: x86_64-unknown-linux-gnu
            build-on: ubuntu-24.04
          - architecture: aarch64
            target: aarch64-unknown-linux-gnu
            build-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ inputs.ref }}

      - name: Update version in Cargo.toml
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "'${{ inputs.version }}'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build CLI in Ubuntu 22.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e RUST_LOG=debug \
            -e RUST_BACKTRACE=1 \
            ubuntu:22.04 bash -c '
              set -euo pipefail

              # Install build dependencies
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                build-essential \
                pkg-config \
                libssl-dev \
                libdbus-1-dev \
                libxcb1-dev \
                libvulkan-dev \
                curl \
                ca-certificates \
                wget \
                gnupg

              # Install glslc from LunarG Vulkan SDK repo (not available in Ubuntu 22.04 base repos)
              wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | apt-key add -
              wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
                https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y shaderc

              # Install Rust toolchain
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --default-toolchain 1.92.0
              . "$HOME/.cargo/env"

              export TARGET="${{ matrix.target }}"
              rustup target add "${TARGET}"
              echo "Building for target: ${TARGET}"
              rustup show

              cargo build --release --target ${TARGET} -p goose-cli --features vulkan
            '

      - name: Package CLI
        run: |
          export TARGET="${{ matrix.target }}"
          mkdir -p "target/${TARGET}/release/goose-package"
          cp "target/${TARGET}/release/goose" "target/${TARGET}/release/goose-package/"
          cd "target/${TARGET}/release"
          tar -cjf "goose-${TARGET}.tar.bz2" -C goose-package .
          tar -czf "goose-${TARGET}.tar.gz" -C goose-package .
          echo "ARTIFACT_BZ2=target/${TARGET}/release/goose-${TARGET}.tar.bz2" >> $GITHUB_ENV
          echo "ARTIFACT_GZ=target/${TARGET}/release/goose-${TARGET}.tar.gz" >> $GITHUB_ENV

      - name: Upload CLI artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: goose-${{ matrix.architecture }}-unknown-linux-gnu
          path: |
            ${{ env.ARTIFACT_BZ2 }}
            ${{ env.ARTIFACT_GZ }}

  # ------------------------------------
  # macOS and Windows builds: unchanged, run natively on host runners.
  # ------------------------------------
  build-cli:
    name: Build CLI
    runs-on: ${{ matrix.build-on }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            architecture: x86_64
            target-suffix: apple-darwin
            build-on: macos-15-intel
            variant: standard
          - platform: macos
            architecture: aarch64
            target-suffix: apple-darwin
            build-on: macos-latest
            variant: standard
          - platform: windows
            architecture: x86_64
            target-suffix: pc-windows-msvc
            build-on: windows-latest
            variant: standard
          - platform: windows
            architecture: x86_64
            target-suffix: pc-windows-msvc
            build-on: windows-latest
            variant: cuda

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ inputs.ref }}

      - name: Update version in Cargo.toml
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "'${{ inputs.version }}'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Cache Cargo artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: ${{ matrix.architecture }}-${{ matrix.target-suffix }}-native-macos-deployment-target-12

      - name: Cache Cargo artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: windows-msvc-cli-${{ matrix.variant }}

      - name: Build CLI (macOS)
        if: matrix.platform == 'macos'
        env:
          RUST_LOG: debug
          RUST_BACKTRACE: 1
        run: |
          source ./bin/activate-hermit
          export TARGET="${{ matrix.architecture }}-${{ matrix.target-suffix }}"
          rustup target add "${TARGET}"
          echo "Building for target: ${TARGET}"
          echo "Rust toolchain info:"
          rustup show

          cargo build --release --target ${TARGET} -p goose-cli

      - name: Setup Rust (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          rustup show
          rustup target add x86_64-pc-windows-msvc

      - name: Install CUDA toolkit (Windows CUDA)
        if: ${{ matrix.platform == 'windows' && matrix.variant == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.1'
          method: 'local'
          log-file-suffix: 'build-cli-windows-cuda.txt'

      - name: Set up MSVC developer environment (Windows CUDA)
        if: ${{ matrix.platform == 'windows' && matrix.variant == 'cuda' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: amd64

      - name: Verify CUDA toolchain (Windows CUDA)
        if: ${{ matrix.platform == 'windows' && matrix.variant == 'cuda' }}
        shell: pwsh
        env:
          CUDA_COMPUTE_CAP: "80"
        run: |
          Write-Output "CUDA_PATH=$env:CUDA_PATH"
          Write-Output "CUDA_COMPUTE_CAP=$env:CUDA_COMPUTE_CAP"
          where.exe cl
          where.exe nvcc
          nvcc -V

      - name: Build CLI (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant == 'cuda' && '80' || '' }}
        run: |
          Write-Output "Building Windows CLI executable..."
          if ("${{ matrix.variant }}" -eq "cuda") {
            cargo build --release --target x86_64-pc-windows-msvc -p goose-cli --features cuda
          } else {
            cargo build --release --target x86_64-pc-windows-msvc -p goose-cli
          }

          if (-not (Test-Path "./target/x86_64-pc-windows-msvc/release/goose.exe")) {
            Write-Error "Windows CLI binary not found."
            Get-ChildItem ./target/x86_64-pc-windows-msvc/release/ -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Output "Windows CLI binary found."
          Get-Item ./target/x86_64-pc-windows-msvc/release/goose.exe

      - name: Package CLI (macOS)
        if: matrix.platform == 'macos'
        run: |
          source ./bin/activate-hermit
          export TARGET="${{ matrix.architecture }}-${{ matrix.target-suffix }}"

          # Create a directory for the package contents
          mkdir -p "target/${TARGET}/release/goose-package"

          # Copy the goose binary
          cp "target/${TARGET}/release/goose" "target/${TARGET}/release/goose-package/"

          cd "target/${TARGET}/release"
          tar -cjf "goose-${TARGET}.tar.bz2" -C goose-package .
          tar -czf "goose-${TARGET}.tar.gz" -C goose-package .
          echo "ARTIFACT_BZ2=target/${TARGET}/release/goose-${TARGET}.tar.bz2" >> $GITHUB_ENV
          echo "ARTIFACT_GZ=target/${TARGET}/release/goose-${TARGET}.tar.gz" >> $GITHUB_ENV

      - name: Package CLI (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export TARGET="${{ matrix.architecture }}-${{ matrix.target-suffix }}"
          export VARIANT_SUFFIX=""
          if [ "${{ matrix.variant }}" = "cuda" ]; then
            VARIANT_SUFFIX="-cuda"
          fi

          mkdir -p "target/${TARGET}/release/goose-package"

          cp "target/${TARGET}/release/goose.exe" "target/${TARGET}/release/goose-package/"

          cd "target/${TARGET}/release"
          7z a -tzip "goose-${TARGET}${VARIANT_SUFFIX}.zip" goose-package/
          echo "ARTIFACT_ZIP=target/${TARGET}/release/goose-${TARGET}${VARIANT_SUFFIX}.zip" >> $GITHUB_ENV

      - name: Upload CLI artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: goose-${{ matrix.architecture }}-${{ matrix.target-suffix }}${{ matrix.variant == 'cuda' && '-cuda' || '' }}
          path: |
            ${{ env.ARTIFACT_BZ2 }}
            ${{ env.ARTIFACT_GZ }}
            ${{ env.ARTIFACT_ZIP }}

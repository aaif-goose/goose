name: Copilot Switchboard CI

on:
  push:
    branches: [main]
    paths:
      - "services/copilot-switchboard/**"
      - ".github/workflows/copilot-switchboard.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/copilot-switchboard/**"
      - ".github/workflows/copilot-switchboard.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/copilot-switchboard

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: services/copilot-switchboard/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

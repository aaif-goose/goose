# This is a **reuseable** workflow that bundles the Desktop App for Linux.
# It doesn't get triggered on its own. It gets used in multiple workflows:
#  - release.yml
#  - canary.yml (when added)
#  - pr-comment-bundle-desktop.yml (when added)
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to set for the build'
        required: false
        default: ""
        type: string
      ref:
        type: string
        required: false
        default: ''

name: "Bundle Desktop (Linux)"

jobs:
  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ inputs.ref }}

      - name: Update versions
        if: ${{ inputs.version != '' }}
        run: |
          # Update version in Cargo.toml
          sed -i.bak 's/^version = ".*"/version = "'${{ inputs.version }}'"/' Cargo.toml
          rm -f Cargo.toml.bak

          # Update version in package.json
          source ./bin/activate-hermit
          cd ui/desktop
          npm pkg set "version=${{ inputs.version }}"

      - name: Debug workflow info
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "=== Workflow Information ==="
          echo "Workflow: ${WORKFLOW_NAME}"
          echo "Ref: ${WORKFLOW_REF}"
          echo "Event: ${EVENT_NAME}"
          echo "Repo: ${REPOSITORY}"
          echo ""
          echo "=== System Information ==="
          uname -a
          lsb_release -a || true
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2t64 \
            rpm \
            fakeroot \
            dpkg-dev \
            protobuf-compiler \
            flatpak \
            flatpak-builder \
            elfutils

      - name: Setup Flatpak Runtimes
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      # Build goosed inside an Ubuntu 22.04 container to produce a binary
      # compatible with glibc 2.35+ (Ubuntu 22.04, Debian 12, RHEL 9, etc.)
      - name: Build goosed binary (Ubuntu 22.04 container)
        env:
          RUST_LOG: debug
          RUST_BACKTRACE: 1
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e RUST_LOG=debug \
            -e RUST_BACKTRACE=1 \
            ubuntu:22.04 bash -c '
              set -euo pipefail

              # Install build dependencies as root
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                build-essential \
                pkg-config \
                libssl-dev \
                libdbus-1-dev \
                libxcb1-dev \
                libvulkan-dev \
                curl \
                ca-certificates \
                wget \
                gnupg \
                sudo

              # Install glslc from LunarG Vulkan SDK repo (not available in Ubuntu 22.04 base repos)
              wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | apt-key add -
              wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
                https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y shaderc

              # Create a non-root user matching the host runner UID/GID so that
              # build artifacts are owned by the runner and subsequent host steps
              # (Copy binaries, Electron packaging) can read them without permission errors.
              HOST_UID=$(stat -c "%u" /workspace)
              HOST_GID=$(stat -c "%g" /workspace)
              groupadd -g "${HOST_GID}" builder 2>/dev/null || true
              useradd -m -u "${HOST_UID}" -g "${HOST_GID}" -s /bin/bash builder

              # Install Rust and build as the non-root builder user
              su builder -c '\''
                set -euo pipefail
                curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                  sh -s -- -y --default-toolchain 1.92.0
                . "$HOME/.cargo/env"

                export TARGET="x86_64-unknown-linux-gnu"
                rustup target add "${TARGET}"
                cargo build --release --target ${TARGET} -p goose-server --features vulkan
              '\''
            '

      - name: Copy binaries into Electron folder
        run: |
          echo "Copying binaries to ui/desktop/src/bin/"
          export TARGET="x86_64-unknown-linux-gnu"
          mkdir -p ui/desktop/src/bin
          cp target/$TARGET/release/goosed ui/desktop/src/bin/
          chmod +x ui/desktop/src/bin/goosed
          ls -la ui/desktop/src/bin/

      - name: Cache pnpm dependencies
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7  # v5.0.2
        with:
          path: |
            ui/desktop/node_modules
            .hermit/node/cache
          key: linux-pnpm-cache-v1-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}
          restore-keys: |
            linux-pnpm-cache-v1-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: |
          source ./bin/activate-hermit
          cd ui/desktop
          pnpm install --frozen-lockfile
          # Verify installation
          ls -la node_modules/.bin/ | head -5

      - name: Build Linux packages
        run: |
          source ./bin/activate-hermit
          cd ui/desktop
          echo "Building Linux packages (.deb, .rpm, and .flatpak)..."

          # Build all configured packages
          pnpm run make --platform=linux --arch=x64

          echo "Build completed. Checking output..."
          ls -la out/
          find out/ -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" | head -10

      - name: List generated files
        run: |
          echo "=== All files in out/ directory ==="
          find ui/desktop/out/ -type f | head -20
          echo ""
          echo "=== Package files specifically ==="
          find ui/desktop/out/ -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak"
          echo ""
          echo "=== File sizes ==="
          find ui/desktop/out/ -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -exec ls -lh {} \;

      - name: Upload .deb package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: Goose-linux-x64-deb
          path: ui/desktop/out/make/deb/x64/*.deb
          if-no-files-found: error

      - name: Upload .rpm package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: Goose-linux-x64-rpm
          path: ui/desktop/out/make/rpm/x64/*.rpm
          if-no-files-found: error

      - name: Upload .flatpak package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: Goose-linux-x64-flatpak
          path: ui/desktop/out/make/flatpak/x86_64/*.flatpak
          if-no-files-found: error
